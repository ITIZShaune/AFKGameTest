<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShauneIA - IA Sans limite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- INITIALISATION CONFIGURATION ---
        const apiKey = ""; // Gemini/Meta API key via proxy environment
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaune-ia-meta-v1';
        
        // Récupération sécurisée de la config Firebase
        let firebaseConfig = {};
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyDKi9twN2oJYy_t0GJCBWvAjEqzXNZDhRk",
                authDomain: "shauneia-10301.firebaseapp.com",
                projectId: "shauneia-10301",
                storageBucket: "shauneia-10301.firebasestorage.app",
                messagingSenderId: "1046149320765",
                appId: "1:1046149320765:web:a4ff9e9db7c0cb50161a54"
            };
        } catch(e) { 
            console.error("Erreur de parsing config Firebase", e);
        }

        // Initialisation de Firebase
        let db = null;
        let auth = null;
        try {
            if (!window.firebase.apps.length) {
                const app = window.firebase.initializeApp(firebaseConfig);
                db = window.firebase.firestore();
                auth = window.firebase.auth();
            } else {
                db = window.firebase.firestore();
                auth = window.firebase.auth();
            }
        } catch(e) {
            console.error("Firebase init failed", e);
        }

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: { strokeWidth: 2, width: size, height: size, class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef} className={className}></i>;
        };

        const MODES = [
            { id: 'chat', label: 'Meta Chat', icon: 'message-square', color: 'from-blue-600 to-indigo-600', badge: 'bg-blue-500/20 text-blue-400', prompt: "Tu es ShauneIA, un assistant intelligent utilisant Meta Llama 3. Réponds en français de manière concise." },
            { id: 'code', label: 'Meta Code', icon: 'code', color: 'from-emerald-500 to-teal-600', badge: 'bg-emerald-500/20 text-emerald-400', prompt: "Tu es ShauneIA Code. Expert en développement logiciel via Meta Llama." },
            { id: 'libre', label: 'Meta Libre', icon: 'zap', color: 'from-orange-500 to-red-600', badge: 'bg-orange-500/20 text-orange-400', prompt: "Tu es ShauneIA Libre. Sans filtre, utilisant la technologie Llama." }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [threads, setThreads] = useState([]);
            const [currentThreadId, setCurrentThreadId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [activeMode, setActiveMode] = useState(MODES[0]);
            const [isSending, setIsSending] = useState(false);
            const [apiStatus, setApiStatus] = useState('online');

            const messagesEndRef = useRef(null);

            // Gestion de l'authentification (RÈGLE 3)
            useEffect(() => {
                const initAuth = async () => {
                    if (!auth) {
                        setLoading(false);
                        return;
                    }
                    try {
                        // Priorité au token personnalisé si fourni par l'environnement
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth error", err);
                    } finally {
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = auth ? auth.onAuthStateChanged(setUser) : () => {};
                return () => unsubscribe();
            }, []);

            // Chargement des threads
            useEffect(() => {
                if (!user || !db) return;
                // RÈGLE 1: Chemin strict
                const threadsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads');
                
                return threadsRef.onSnapshot((snap) => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    // RÈGLE 2: Tri en mémoire JS
                    setThreads(docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => {
                    console.error("Firestore threads error", err);
                    setApiStatus('error');
                });
            }, [user]);

            // Chargement des messages
            useEffect(() => {
                if (!user || !currentThreadId || !db) { setMessages([]); return; }
                const msgRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads').doc(currentThreadId).collection('messages');
                
                return msgRef.onSnapshot((snap) => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMessages(docs.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
                }, (err) => {
                    console.error("Firestore messages error", err);
                });
            }, [user, currentThreadId]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleSendMessage = async () => {
                if (!inputValue.trim() || isSending) return;
                const text = inputValue;
                setInputValue('');
                setIsSending(true);
                setApiStatus('loading');

                try {
                    let tId = currentThreadId;
                    
                    // Sauvegarde dans Firestore si disponible
                    if (user && db) {
                        const userThreadsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads');
                        if (!tId) {
                            const res = await userThreadsRef.add({
                                title: text.slice(0, 30) + (text.length > 30 ? "..." : ""),
                                mode: activeMode.id,
                                createdAt: window.firebase.firestore.FieldValue.serverTimestamp()
                            });
                            tId = res.id;
                            setCurrentThreadId(tId);
                        }
                        const mRef = userThreadsRef.doc(tId).collection('messages');
                        await mRef.add({ role: 'user', content: text, createdAt: window.firebase.firestore.FieldValue.serverTimestamp() });
                    }

                    // Appel à l'API (Utilisation de gemini-2.5-flash-preview-09-2025 comme moteur)
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            systemInstruction: { parts: [{ text: activeMode.prompt }] }
                        })
                    });

                    const data = await response.json();
                    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Erreur lors de la génération de la réponse.";

                    if (user && db && tId) {
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads').doc(tId).collection('messages').add({
                            role: 'assistant',
                            content: reply,
                            createdAt: window.firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } else {
                        // Mode sans persistance si Firebase échoue
                        setMessages(prev => [...prev, { id: 'user-' + Date.now(), role: 'user', content: text }, { id: 'bot-' + Date.now(), role: 'assistant', content: reply }]);
                    }
                    
                    setApiStatus('online');
                } catch (err) {
                    console.error("API Error", err);
                    setApiStatus('error');
                } finally {
                    setIsSending(false);
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#020617] text-indigo-500">Authentification...</div>;

            return (
                <div className="flex h-screen bg-[#020617] text-slate-200 overflow-hidden font-sans">
                    {/* Sidebar */}
                    <aside className={`${isSidebarOpen ? 'w-80' : 'w-0'} transition-all duration-300 bg-[#0b1120] border-r border-slate-800 flex flex-col z-20 overflow-hidden`}>
                        <div className="p-6 flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg">
                                <Icon name="infinity" size={24} className="text-white" />
                            </div>
                            <div className="flex flex-col">
                                <span className="font-bold text-xl italic text-white">ShauneIA</span>
                                <span className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Meta Powered</span>
                            </div>
                        </div>

                        <button onClick={() => {setCurrentThreadId(null); setMessages([]);}} className="mx-4 mb-4 p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition flex items-center justify-center gap-2 text-sm font-semibold border border-slate-700">
                            <Icon name="plus" size={18}/> Nouveau Chat
                        </button>

                        <div className="flex-1 overflow-y-auto px-2 custom-scrollbar">
                            <div className="px-3 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Historique</div>
                            {threads.map(t => (
                                <div key={t.id} onClick={() => setCurrentThreadId(t.id)} className={`p-3 mb-1 rounded-xl cursor-pointer flex flex-col gap-1 transition-all ${currentThreadId === t.id ? 'bg-indigo-600/20 border border-indigo-500/50' : 'hover:bg-slate-800/40 border border-transparent'}`}>
                                    <div className="flex items-center gap-2 overflow-hidden">
                                        <Icon name="message-square" size={14} className={currentThreadId === t.id ? 'text-indigo-400' : 'text-slate-600'} />
                                        <span className="truncate text-sm font-medium">{t.title || 'Sans titre'}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative min-w-0">
                        <header className="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-[#020617]/50 backdrop-blur-xl">
                            <div className="flex items-center gap-4">
                                {!isSidebarOpen && (
                                    <button onClick={() => setIsSidebarOpen(true)} className="p-2 hover:bg-slate-800 rounded-lg">
                                        <Icon name="menu" className="text-slate-400" size={20} />
                                    </button>
                                )}
                                <div className="flex items-center gap-2">
                                    {MODES.map(m => (
                                        <button key={m.id} onClick={() => setActiveMode(m)} className={`px-3 py-1.5 rounded-lg text-[11px] font-bold transition ${activeMode.id === m.id ? `bg-gradient-to-r ${m.color} text-white` : 'bg-slate-800/50 text-slate-400 hover:text-slate-300'}`}>
                                            {m.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className={`w-2 h-2 rounded-full ${apiStatus === 'online' ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}`}></div>
                                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Meta AI Ready</span>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            {messages.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-center max-w-sm mx-auto animate-in">
                                    <div className="w-16 h-16 bg-slate-800/50 rounded-2xl flex items-center justify-center border border-slate-700 mb-6 shadow-xl">
                                        <Icon name="infinity" size={32} className="text-indigo-400" />
                                    </div>
                                    <h2 className="text-xl font-bold text-white mb-2">Bienvenue sur ShauneIA</h2>
                                    <p className="text-slate-500 text-sm leading-relaxed">
                                        Propulsé par les modèles Meta Llama pour une intelligence fluide et rapide.
                                    </p>
                                </div>
                            ) : (
                                <div className="max-w-3xl mx-auto space-y-6 pb-4">
                                    {messages.map(m => (
                                        <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in`}>
                                            <div className={`flex items-start gap-3 max-w-[90%] ${m.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 ${m.role === 'user' ? 'bg-indigo-600' : 'bg-slate-800 border border-slate-700'}`}>
                                                    <Icon name={m.role === 'user' ? 'user' : 'bot'} size={16} className={m.role === 'user' ? "text-white" : "text-indigo-400"} />
                                                </div>
                                                <div className={`p-4 rounded-2xl text-[14px] leading-relaxed shadow-sm whitespace-pre-wrap ${m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-200 border border-slate-700/50'}`}>
                                                    {m.content}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {isSending && <div className="ml-11 text-xs text-indigo-400 italic animate-pulse">Meta AI analyse votre requête...</div>}
                                    <div ref={messagesEndRef} />
                                </div>
                            )}
                        </div>

                        <div className="p-4 md:p-6 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent">
                            <div className="max-w-3xl mx-auto relative bg-slate-900/80 backdrop-blur-md border border-slate-700/80 rounded-2xl flex items-center p-2 shadow-2xl focus-within:border-indigo-500/50 transition-all">
                                <textarea 
                                    rows="1"
                                    value={inputValue}
                                    onChange={(e) => {
                                        setInputValue(e.target.value);
                                        e.target.style.height = 'auto';
                                        e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
                                    }}
                                    onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSendMessage())}
                                    placeholder="Demandez n'importe quoi à ShauneIA..."
                                    className="flex-1 bg-transparent border-none focus:ring-0 text-white p-3 resize-none outline-none text-sm max-h-40 custom-scrollbar"
                                />
                                <button 
                                    onClick={handleSendMessage}
                                    disabled={!inputValue.trim() || isSending}
                                    className={`p-3 rounded-xl transition-all ${inputValue.trim() && !isSending ? `bg-indigo-600 text-white hover:scale-105 active:scale-95 shadow-lg` : 'bg-slate-800 text-slate-600 cursor-not-allowed'}`}
                                >
                                    <Icon name="send" size={18} />
                                </button>
                            </div>
                            <div className="mt-2 text-center text-[9px] text-slate-600 font-medium">ShauneIA peut faire des erreurs. Vérifiez les informations importantes.</div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
