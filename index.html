<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShauneIA - Puissance de l'IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .file-pill { display: flex; align-items: center; gap: 8px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 6px 12px; font-size: 11px; color: #94a3b8; max-width: 220px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .file-pill img { width: 32px; height: 32px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .file-pill .pill-icon { width: 32px; height: 32px; border-radius: 8px; background: #0f172a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
        .file-pill .pill-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
        .file-pill .pill-remove { cursor: pointer; color: #475569; border: none; background: none; padding: 2px; display: flex; align-items: center; flex-shrink: 0; transition: color 0.2s; }
        .file-pill .pill-remove:hover { color: #f87171; }

        .msg-image { border-radius: 16px; max-width: 100%; height: auto; border: 1px solid rgba(99,102,241,0.2); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); margin-top: 8px; display: block; }
        .suggestion-card { background: #0f172a; border: 1px solid #1e293b; transition: all 0.2s; cursor: pointer; }
        .suggestion-card:hover { border-color: #6366f1; background: #1e293b; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const apiKey = "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"; 
        const STORAGE_KEY = "shaune_ia_local_data_v2";

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });

        const fileToText = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsText(file);
        });

        const isImageFile = (file) => file.type.startsWith('image/');
        const isTextFile = (file) => file.type.startsWith('text/') || ['application/json', 'text/csv'].includes(file.type);

        const MODES = [
            { id: 'chat', label: 'Chat', icon: 'bi-chat-dots', prompt: "Tu es ShauneIA, un assistant intelligent. Réponds en français de manière concise." },
            { id: 'code', label: 'Code', icon: 'bi-code-slash', prompt: "Tu es ShauneIA Code. Expert en développement logiciel." },
            { id: 'image', label: 'Image', icon: 'bi-palette', prompt: "Tu es un expert en création de requêtes pour générateurs d'images. Traduis l'idée de l'utilisateur en un prompt descriptif ultra détaillé en anglais. Ne renvoie QUE le texte du prompt en anglais." },
            { id: 'libre', label: 'Libre', icon: 'bi-lightning-charge', prompt: "Tu es ShauneIA Libre. Réponds avec franchise et efficacité." }
        ];

        const SUGGESTIONS = [
            { title: "Générer une image", text: "Un paysage cyberpunk sous la pluie avec des néons", icon: "bi-image", mode: "image" },
            { title: "Analyser du code", text: "Explique-moi comment fonctionne cette fonction JavaScript", icon: "bi-braces", mode: "code" },
            { title: "Rédiger un mail", text: "Écris un mail professionnel pour demander un congé", icon: "bi-envelope", mode: "chat" },
            { title: "Aide créative", text: "Donne-moi 5 idées de noms pour une startup IA", icon: "bi-lightbulb", mode: "libre" }
        ];

        function App() {
            const [threads, setThreads] = useState([]);
            const [currentThreadId, setCurrentThreadId] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [inputValue, setInputValue] = useState('');
            const [activeMode, setActiveMode] = useState(MODES[0]);
            const [isSending, setIsSending] = useState(false);
            const [attachedFiles, setAttachedFiles] = useState([]);
            const [lastError, setLastError] = useState(null);

            const messagesEndRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try { setThreads(JSON.parse(saved)); } catch (e) { console.error(e); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(threads));
            }, [threads]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [threads, currentThreadId, isSending]);

            const currentThread = threads.find(t => t.id === currentThreadId);
            const messages = currentThread ? currentThread.messages : [];

            const handleFiles = async (rawFiles) => {
                const newAttachments = [];
                for (const file of rawFiles) {
                    try {
                        let preview = null, base64 = null, text = null;
                        if (isImageFile(file)) {
                            base64 = await fileToBase64(file);
                            preview = `data:${file.type};base64,${base64}`;
                        } else if (isTextFile(file)) {
                            text = await fileToText(file);
                        } else {
                            base64 = await fileToBase64(file);
                        }
                        newAttachments.push({ name: file.name, type: file.type, preview, base64, text });
                    } catch (err) { console.error(err); }
                }
                setAttachedFiles(prev => [...prev, ...newAttachments]);
            };

            const handleSendMessage = async (customText = null, customMode = null) => {
                const textToSend = customText !== null ? customText : inputValue;
                const modeToSend = customMode !== null ? customMode : activeMode;
                
                const hasText = textToSend.trim();
                const hasFiles = attachedFiles.length > 0;
                if ((!hasText && !hasFiles) || isSending) return;
                
                const attachments = [...attachedFiles];
                setInputValue('');
                setAttachedFiles([]);
                setIsSending(true);
                setLastError(null);

                try {
                    let tId = currentThreadId;
                    let updatedThreads = [...threads];

                    if (!tId) {
                        tId = Date.now().toString();
                        const newThread = {
                            id: tId,
                            title: (hasText || attachments[0]?.name || 'Nouvelle session').slice(0, 30),
                            mode: modeToSend.id,
                            messages: []
                        };
                        updatedThreads.unshift(newThread);
                        setCurrentThreadId(tId);
                    }

                    const userMsg = { 
                        id: Date.now().toString(), 
                        role: 'user', 
                        content: hasText, 
                        attachments: attachments.map(a => ({name: a.name, type: a.type, preview: a.preview})) 
                    };
                    
                    updatedThreads = updatedThreads.map(t => 
                        t.id === tId ? { ...t, messages: [...t.messages, userMsg] } : t
                    );
                    setThreads(updatedThreads);

                    // API Call
                    const messagesForApi = [{ role: "system", content: modeToSend.prompt }];
                    const userContent = [];
                    if (hasText) userContent.push({ type: "text", text: hasText });
                    attachments.forEach(att => {
                        if (att.preview && att.type.startsWith('image/')) {
                            userContent.push({ type: "image_url", image_url: { url: att.preview } });
                        } else if (att.text) {
                            userContent.push({ type: "text", text: `Fichier ${att.name}:\n${att.text}` });
                        }
                    });
                    messagesForApi.push({ role: "user", content: userContent });

                    const hasImages = attachments.some(a => a.type.startsWith('image/'));
                    const model = hasImages ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";

                    const response = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model, messages: messagesForApi, temperature: 0.7 })
                    });

                    if (!response.ok) throw new Error("Erreur de connexion");

                    const data = await response.json();
                    let reply = data.choices?.[0]?.message?.content;

                    if (modeToSend.id === 'image') {
                        reply = `https://image.pollinations.ai/prompt/${encodeURIComponent(reply)}?width=1024&height=1024&nologo=true`;
                    }

                    const botMsg = { id: (Date.now()+1).toString(), role: 'assistant', content: reply };
                    setThreads(prev => prev.map(t => 
                        t.id === tId ? { ...t, messages: [...t.messages, botMsg] } : t
                    ));

                } catch (err) {
                    setLastError(err.message);
                } finally {
                    setIsSending(false);
                }
            };

            const handleSuggestionClick = (s) => {
                const targetMode = MODES.find(m => m.id === s.mode) || activeMode;
                setActiveMode(targetMode);
                handleSendMessage(s.text, targetMode);
            };

            return (
                <div className="flex h-screen bg-[#020617] text-slate-200 overflow-hidden">
                    {/* Sidebar */}
                    <aside className={`${isSidebarOpen ? 'w-72' : 'w-0'} transition-all duration-300 bg-[#0b1120] border-r border-slate-800 flex flex-col z-20 overflow-hidden`}>
                        <div className="p-6 flex items-center gap-3">
                            <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white"><i className="bi bi-infinity text-xl"></i></div>
                            <span className="font-bold text-lg tracking-tight">ShauneIA</span>
                        </div>
                        <button onClick={() => setCurrentThreadId(null)} className="mx-4 mb-4 p-2 rounded-lg bg-indigo-600/10 border border-indigo-600/20 text-indigo-400 text-xs font-bold hover:bg-indigo-600/20 transition-all flex items-center justify-center gap-2">
                            <i className="bi bi-plus-lg"></i> NOUVELLE SESSION
                        </button>
                        <div className="flex-1 overflow-y-auto px-4 custom-scrollbar space-y-1">
                            {threads.map(t => (
                                <div key={t.id} onClick={() => setCurrentThreadId(t.id)} className={`group flex items-center justify-between p-3 rounded-xl cursor-pointer text-xs truncate transition-all ${currentThreadId === t.id ? 'bg-indigo-600/20 text-indigo-400 border border-indigo-600/30' : 'hover:bg-slate-800/50 border border-transparent'}`}>
                                    <span className="truncate flex items-center gap-2">
                                        <i className={`bi ${MODES.find(m => m.id === t.mode)?.icon || 'bi-chat'}`}></i>
                                        {t.title}
                                    </span>
                                    <button onClick={(e) => { e.stopPropagation(); setThreads(threads.filter(x => x.id !== t.id)); if(currentThreadId === t.id) setCurrentThreadId(null); }} className="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition-opacity"><i className="bi bi-trash3"></i></button>
                                </div>
                            ))}
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 shrink-0 bg-[#020617]/50 backdrop-blur-md">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-slate-800 rounded-lg transition"><i className="bi bi-list text-xl"></i></button>
                            <div className="flex gap-1.5 p-1 bg-slate-900 rounded-full border border-slate-800">
                                {MODES.map(m => (
                                    <button key={m.id} onClick={() => setActiveMode(m)} className={`px-4 py-1.5 rounded-full text-[10px] font-bold transition-all flex items-center gap-2 ${activeMode.id === m.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <i className={`bi ${m.icon}`}></i> {m.label}
                                    </button>
                                ))}
                            </div>
                            <div className="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 shadow-inner"><i className="bi bi-person-fill text-slate-400"></i></div>
                        </header>

                        {lastError && <div className="m-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-xs flex justify-between animate-in"><span>{lastError}</span><button onClick={() => setLastError(null)}><i className="bi bi-x-lg"></i></button></div>}

                        {/* Message Zone */}
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            {!currentThreadId ? (
                                <div className="h-full flex flex-col items-center justify-center max-w-2xl mx-auto space-y-12">
                                    <div className="text-center animate-in">
                                        <div className="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center text-white text-3xl mx-auto mb-4 shadow-xl shadow-indigo-600/30"><i className="bi bi-infinity"></i></div>
                                        <h2 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Comment puis-je vous aider aujourd'hui ?</h2>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full animate-in" style={{animationDelay: '0.1s'}}>
                                        {SUGGESTIONS.map((s, i) => (
                                            <div key={i} onClick={() => handleSuggestionClick(s)} className="suggestion-card p-4 rounded-2xl flex flex-col gap-2">
                                                <div className="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-indigo-400"><i className={`bi ${s.icon}`}></i></div>
                                                <h3 className="text-sm font-bold">{s.title}</h3>
                                                <p className="text-xs text-slate-500 line-clamp-1">{s.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-3xl mx-auto">
                                    {messages.map((m) => {
                                        const isUser = m.role === 'user';
                                        return (
                                            <div key={m.id} className={`flex ${isUser ? 'justify-end' : 'justify-start'} animate-in mb-8`}>
                                                <div className={`flex items-start gap-4 max-w-[90%] ${isUser ? 'flex-row-reverse' : 'flex-row'}`}>
                                                    <div className={`w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 shadow-lg ${isUser ? 'bg-indigo-600 text-white' : 'bg-slate-800 border border-slate-700 text-indigo-400'}`}>
                                                        <i className={`bi ${isUser ? 'bi-person-fill' : 'bi-robot'}`}></i>
                                                    </div>
                                                    <div className={`p-4 rounded-2xl text-[14px] leading-relaxed shadow-sm whitespace-pre-wrap ${isUser ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-200 border border-slate-700/50'}`}>
                                                        {(m.attachments || []).map((a, i) => (
                                                            <div key={i} className="mb-3">
                                                                {a.preview ? <img src={a.preview} className="msg-image" /> : <div className="attach-badge"><i className="bi bi-file-earmark-text mr-1"></i> {a.name}</div>}
                                                            </div>
                                                        ))}
                                                        {m.content && (m.content.startsWith('https://') && m.content.includes('pollinations.ai') ? <img src={m.content} className="msg-image" /> : <span>{m.content}</span>)}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div ref={messagesEndRef} />
                                </div>
                            )}
                        </div>

                        {/* Input Area */}
                        <div className="p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent shrink-0">
                            <div className="max-w-3xl mx-auto bg-slate-900/50 backdrop-blur-xl border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
                                {attachedFiles.length > 0 && (
                                    <div className="flex gap-2 p-3 flex-wrap border-b border-slate-800/50 bg-slate-900/30">
                                        {attachedFiles.map((a, i) => (
                                            <div key={i} className="file-pill animate-in">
                                                {a.preview ? <img src={a.preview} /> : <div className="pill-icon"><i className="bi bi-file-earmark-code"></i></div>}
                                                <span className="pill-name">{a.name}</span>
                                                <button className="pill-remove" onClick={() => setAttachedFiles(f => f.filter((_, idx) => idx !== i))}><i className="bi bi-x-circle-fill"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="flex items-end p-3 gap-2">
                                    <button onClick={() => fileInputRef.current.click()} className="mb-1 p-2.5 text-slate-500 hover:text-indigo-400 hover:bg-slate-800 rounded-xl transition-all"><i className="bi bi-paperclip text-xl"></i></button>
                                    <input type="file" ref={fileInputRef} multiple style={{display:'none'}} onChange={e => handleFiles(Array.from(e.target.files))} />
                                    <textarea 
                                        rows="1" 
                                        value={inputValue} 
                                        onChange={e => setInputValue(e.target.value)} 
                                        onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSendMessage())}
                                        placeholder="Décrivez votre besoin ou posez une question..." 
                                        className="flex-1 bg-transparent border-none focus:ring-0 text-sm p-2.5 outline-none resize-none max-h-48 custom-scrollbar leading-relaxed"
                                        style={{ height: 'auto' }}
                                        onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                                    />
                                    <button onClick={() => handleSendMessage()} disabled={isSending} className="mb-1 w-10 h-10 bg-indigo-600 rounded-xl text-white disabled:opacity-50 hover:bg-indigo-500 hover:scale-105 active:scale-95 transition-all flex items-center justify-center shadow-lg shadow-indigo-600/20 shrink-0">
                                        {isSending ? <i className="bi bi-arrow-repeat animate-spin text-xl"></i> : <i className="bi bi-arrow-up-short text-3xl"></i>}
                                    </button>
                                </div>
                            </div>
                            <div className="mt-3 text-center flex items-center justify-center gap-4 text-[10px] text-slate-600 font-bold uppercase tracking-[0.2em]">
                                <span className="flex items-center gap-1.5"><i className="bi bi-shield-lock-fill text-indigo-900"></i> Local storage v2</span>
                                <span className="opacity-30">|</span>
                                <span className="flex items-center gap-1.5"><i className="bi bi-cpu-fill text-indigo-900"></i> Groq Llama 3.3</span>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
